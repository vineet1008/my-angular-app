<div class="dialog-container">
  <div class="dialog-header">
    <h2>Add New User</h2>
    <button mat-icon-button (click)="onCancel()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="userForm" (ngSubmit)="onSave()">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Full Name</mat-label>
      <input matInput formControlName="name" placeholder="Enter full name" />
    </mat-form-field>
     <mat-form-field appearance="outline" class="full-width">
      <mat-label>username</mat-label>
      <input matInput formControlName="username" type="username" placeholder="Enter username" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email" placeholder="Enter email" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Address</mat-label>
      <input matInput formControlName="address" type="address" placeholder="Enter address" />
    </mat-form-field>
     <mat-form-field appearance="outline" class="full-width">
      <mat-label>mobile Number</mat-label>
      <input matInput formControlName="mobile_number" type="mobile_number" placeholder="Enter mobile_number" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
       <mat-label>Role</mat-label>
        <mat-select formControlName="role">
          <mat-option
            *ngFor="let role of roles"
            [value]="role.id">
            {{ role.name }}
          </mat-option>
        </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option value="0">Active</mat-option>
        <mat-option value="1">Inactive</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Password</mat-label>
      <input
        matInput
        [type]="hidePassword ? 'password' : 'text'"
        formControlName="password"
        placeholder="Enter password"
      />
      <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
    </mat-form-field>

    <div class="dialog-actions">
      <button mat-stroked-button type="button" (click)="onCancel()">Cancel</button>
      <button mat-raised-button class="save-btn" type="submit">Save User</button>
    </div>

  </form>
</div>
