<div class="users-page">

  <!-- Top Header -->
  <div class="users-header glass-card">
    <div>
      <h1>Users Management</h1>
      <p>Manage all users in your system</p>
    </div>

    <button mat-raised-button class="add-user-btn" (click)="openAddUserDialog()">
    <mat-icon>person_add</mat-icon>
    Add User
    </button>
  </div>

  <!-- Search and Filter -->
  <div class="users-toolbar glass-card">
    <div class="search-box">
      <mat-icon>search</mat-icon>
      <input type="text" placeholder="Search users..." />
    </div>

    <button mat-stroked-button class="filter-btn">
      <mat-icon>filter_list</mat-icon>
      Filter
    </button>
  </div>

  <!-- User Table -->
  <div class="users-table-section glass-card">
    <table mat-table [dataSource]="users" class="custom-table">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let user">{{ user.name }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let user">{{ user.role }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let user">
          <span class="status-badge" [ngClass]="user.status.toLowerCase()">
            {{ user.status }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef>Action</th>
        <td mat-cell *matCellDef="let user">
          <button mat-icon-button>
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button>
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <!-- Back Button -->
  <div class="back-section">
    <a routerLink="/dashboard" class="back-link">
      <mat-icon>arrow_back</mat-icon>
      Back to Dashboard
    </a>
  </div>

</div>
