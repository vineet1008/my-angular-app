
<div class="login-container">
  <mat-card class="login-card">
    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Please login to continue</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

      <!-- Email -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username" type="username" placeholder="Enter your username" />

        <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
          username is required
        </mat-error>

        <mat-error *ngIf="loginForm.get('username')?.hasError('email')">
          Please enter a valid username
        </mat-error>
      </mat-form-field>

      <!-- Password -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          formControlName="password"
          placeholder="Enter your password"
        />

        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hidePassword = !hidePassword"
        >
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>

        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
          Password is required
        </mat-error>

        <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
          Password must be at least 6 characters
        </mat-error>
      </mat-form-field>

      <!-- Forgot Password -->
      <div class="forgot-password">
        <a href="javascript:void(0)">Forgot Password?</a>
      </div>

      <!-- Login Button -->
      <button mat-raised-button color="primary" class="full-width login-btn" type="submit">
        Login
      </button>

    </form>
  </mat-card>
</div>
